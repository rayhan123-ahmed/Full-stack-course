<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>Grid layout desing</title>
</head>
<body class="bg-gray-800 text-white">
    <div class="m-4 grid sm:grid-cols-2 gap-4  ">
        <div class="min-h-24 rounded-sm bg-orange-200 shadow"></div>
        <div class="min-h-24 rounded-sm bg-blue-200 shadow"></div>
    </div>


    <div class="m-4 grid sm:grid-cols-3  gap-4  ">
        <div class="min-h-24 rounded-sm bg-orange-200 shadow"></div>
        <div class="min-h-24 rounded-sm bg-blue-200 shadow"></div>
        <div class="min-h-24 rounded-sm bg-red-500 shadow"></div>
    </div>


    <div class="m-4 grid grid-cols-1  lg:grid-cols-2  gap-4  ">
        <div class="min-h-24 rounded-sm bg-orange-200 shadow lg:col-span-2"></div>
        <div class="min-h-24 rounded-sm bg-blue-200 shadow"></div>
        <div class="min-h-24 rounded-sm bg-red-500 shadow"></div>
    </div>

    <div class="m-4  grid grid-cols-1  gap-4 sm:grid-cols-2 ">
        <div class="min-h-24 rounded-sm bg-orange-200 shadow sm:col-span-2"></div>
        <div class="min-h-24 rounded-sm bg-blue-200 shadow "></div>
        <div class="min-h-24 rounded-sm bg-red-500 shadow "></div>
        <div class="min-h-24 rounded-sm bg-yellow-500 shadow sm:col-span-2"></div>
    </div>

    <div class="m-4 gap-4 grid sm:grid-cols-12 grid-cols-1  ">
        <div class="min-h-24 rounded-sm bg-orange-200 shadow sm:col-span-4"></div>
        <div class="min-h-24 rounded-sm bg-blue-200 shadow sm:col-span-3 "></div>
        <div class="min-h-24 rounded-sm bg-blue-200 shadow sm:col-span-5 sm:block hidden"></div>
    </div>
    
</body>
</html>
