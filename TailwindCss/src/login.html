<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>login Page</title>
</head>
<body class="bg-gray-900 flex h-screen justify-center items-center text-white  ">
    <div class="bg-gray-700 rounded-lg p-6 shadow-lg max-w-sm">
      <h1 class="font-bold text-2xl mb-5 text-center">Login</h1>
    <form action="">
       <div>
        <label for="email">Email</label>
        <input 
        class="w-full p-2 bg-gray-500 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600"
         type="email"
         placeholder="Email">
       </div>  
       <div class="mb-2">
        <label for="password">password</label>
        <input  
        class="w-full p-2 bg-gray-500 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600"
        type="password" 
        placeholder="Password">
       </div>  
       <button class="
       text-center w-full mt-3.5 bg-blue-600 hover:bg-blue-500 p-1 rounded-md shadow-2xl
       ">login</button>
    </form>
    </div>
    
</body>
</html>
